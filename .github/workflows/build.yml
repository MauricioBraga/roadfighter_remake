name: Build and release (Windows)

# Roda sempre que uma tag de versão for enviada (ex: "v1.0.0"), ou manualmente
# pelo botão "Run workflow" na aba Actions.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write   # necessário para criar a Release e subir o zip

env:
  VCPKG_TRIPLET: x64-windows
  BUILD_CONFIG: Release

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Preferimos baixar/bootstrapar nosso próprio vcpkg em vez de depender
      # do que já vem instalado no runner: a localização dele
      # (VCPKG_INSTALLATION_ROOT) já mudou entre versões da imagem do
      # runner, o que tornaria o build frágil. Clonar aqui garante
      # reprodutibilidade.
      - name: Check out vcpkg
        uses: actions/checkout@v4
        with:
          repository: microsoft/vcpkg
          path: vcpkg

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: |
            vcpkg\installed
            vcpkg\downloads
          key: vcpkg-${{ env.VCPKG_TRIPLET }}-sdl3-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            vcpkg-${{ env.VCPKG_TRIPLET }}-sdl3-

      - name: Bootstrap vcpkg
        shell: pwsh
        run: .\vcpkg\bootstrap-vcpkg.bat -disableMetrics

      - name: Install SDL3 dependencies (vcpkg)
        shell: pwsh
        run: |
          .\vcpkg\vcpkg.exe install `
            sdl3 sdl3-image sdl3-ttf sdl3-mixer `
            --triplet $env:VCPKG_TRIPLET

      - name: Configure (CMake)
        shell: pwsh
        run: |
          cmake -B build -S . -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$(Resolve-Path vcpkg\scripts\buildsystems\vcpkg.cmake)" `
            -DVCPKG_TARGET_TRIPLET=$env:VCPKG_TRIPLET

      - name: Build
        shell: pwsh
        run: |
          cmake --build build --config $env:BUILD_CONFIG

      # O CMakeLists.txt já copia as DLLs de runtime e as pastas
      # fonts/graphics/maps/sound para junto do roadfighter.exe como passo
      # pós-build, então a pasta de saída já é uma cópia pronta pra rodar.
      # Só falta zipar.
      - name: Package release zip
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          if ($version -eq "") { $version = "dev" }
          $outDir  = "build\$env:BUILD_CONFIG"
          $zipName = "roadfighter-windows-x64-$version.zip"
          Compress-Archive -Path "$outDir\*" -DestinationPath $zipName
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: roadfighter-windows-x64
          path: ${{ env.ZIP_NAME }}

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: true