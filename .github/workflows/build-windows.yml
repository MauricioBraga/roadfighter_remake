name: Build and release (Windows)

# Runs whenever a version tag is pushed (e.g. "v1.0.0"), or manually via the
# "Run workflow" button in the Actions tab.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write   # needed to create the GitHub Release and upload the zip

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Uses MSYS2/MinGW64, the same environment already proven to build
      # this project successfully on a developer machine (pacman-provided
      # SDL3 packages, not vcpkg).
      - name: Set up MSYS2 (MinGW64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-sdl3
            mingw-w64-x86_64-sdl3-image
            mingw-w64-x86_64-sdl3-ttf
            mingw-w64-x86_64-sdl3-mixer
            zip

      - name: Configure (CMake)
        run: |
          cmake -B build -S . -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cmake --build build

      # $<TARGET_RUNTIME_DLLS:roadfighter> in CMakeLists.txt only copies the
      # DLLs of directly-linked CMake targets (SDL3, SDL3_image, SDL3_ttf,
      # SDL3_mixer) - it does NOT walk their transitive dependencies. That
      # misses things like the MinGW runtime itself (libstdc++-6.dll,
      # libgcc_s_seh-1.dll, libwinpthread-1.dll) and whatever SDL3_ttf/
      # SDL3_image/SDL3_mixer pull in under the hood (FreeType, HarfBuzz,
      # libpng, zlib, libogg/libvorbis, etc). We resolve the *full*
      # dependency closure with ldd instead, repeating until no new DLLs
      # are found, so the zip works on a clean Windows machine with no
      # MSYS2/MinGW installed.
      - name: Bundle all MinGW runtime DLLs
        run: |
          exe="build/roadfighter.exe"
          added=1
          while [ "$added" -ne 0 ]; do
            added=0
            for f in "$exe" build/*.dll; do
              [ -f "$f" ] || continue
              for dep in $(ldd "$f" 2>/dev/null | grep '/mingw64/bin/' | awk '{print $3}'); do
                base=$(basename "$dep")
                if [ ! -f "build/$base" ]; then
                  cp "$dep" "build/$base"
                  added=1
                fi
              done
            done
          done

      # CMakeLists.txt already copies the fonts/graphics/maps/sound folders
      # next to roadfighter.exe as a post-build step, and the previous step
      # took care of every DLL, so the output folder is already a
      # ready-to-run, self-contained copy of the game. We just need to zip
      # it up.
      - name: Package release zip
        run: |
          version="${GITHUB_REF_NAME:-dev}"
          zip_name="roadfighter-windows-x64-${version}.zip"
          (cd build && zip -r "../${zip_name}" .)
          echo "ZIP_NAME=${zip_name}" >> "$GITHUB_ENV"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: roadfighter-windows-x64
          path: ${{ env.ZIP_NAME }}

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: true
